<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IZV Virtual Tour</title>
    <style>
        html, body {
          margin: 0;
          width: 100%;
          height: 100%;
        }

        #pano {
          position: absolute;
          width: 100%;
          height: 100%;
        }

        #overlay {
          position: absolute;
          inset: 0;
          pointer-events: none;
        }

        .bulta-overlay {
            position: absolute;
            width: 48px;
            height: 48px;
            pointer-events: auto;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }
        .bulta-overlay.aktivs {
            opacity: 1;
            pointer-events: auto;
        }
    </style>

<body>
    <div id="pano"></div>
    <div id="overlay"></div>
    <script src="marzipano.js"></script>
    <script src="main.js"></script>
</body>
</html>
